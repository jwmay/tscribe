name: tscribe
options:
  bundleIdPrefix: com.jwmay
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
# Build configurations. `ReleaseStandard` is the download-on-first-launch edition:
# it inherits Release but defines the `DOWNLOAD_MODEL` compilation condition, which turns
# on the model downloader + onboarding flow. `Release` is the Complete edition
# (model bundled, fully offline) and stays byte-identical to the 1.0 build.
configs:
  Debug: debug
  Release: release
  ReleaseStandard: release
settings:
  base:
    MARKETING_VERSION: "2.1.2"
    CURRENT_PROJECT_VERSION: "19"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
# Sparkle (auto-update) is a Standard-only dependency, but SPM has no notion of a
# per-configuration dependency: declaring it here links it into EVERY config. The
# Complete edition's "no network, ever" claim survives that because the link is made to
# genuinely disappear — Complete compiles without SPARKLE_UPDATES, so it references zero
# Sparkle symbols, and `-dead_strip_dylibs` (below) drops the load command. package.sh
# then deletes the embedded framework, and the offline-audit PROVES both are gone
# (otool -L + a bundle-wide grep). See "Auto-updates (Sparkle)" in CLAUDE.md.
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.9.4"
targets:
  tscribe:
    type: application
    platform: macOS
    sources:
      - Sources/App
      - Sources/Core
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: Tscribe
        PRODUCT_BUNDLE_IDENTIFIER: com.jwmay.tscribe
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        # Debug defines SPARKLE_UPDATES so the update flow can be exercised locally (it
        # stays inert until the user opts in). Debug does NOT define DOWNLOAD_MODEL — it's
        # a Complete-style dev build using the ~/Developer/whisper.cpp model fallback.
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) SPARKLE_UPDATES"
          INFOPLIST_FILE: assets/Info-Sparkle.plist
        # Standard edition: the model downloader + onboarding (#if DOWNLOAD_MODEL) and the
        # Sparkle updater (#if SPARKLE_UPDATES). The Sparkle Info.plist keys (feed URL,
        # public EdDSA key) are scoped to this config, so they cannot reach a Complete build.
        ReleaseStandard:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DOWNLOAD_MODEL SPARKLE_UPDATES"
          INFOPLIST_FILE: assets/Info-Sparkle.plist
        # Complete edition: no SPARKLE_UPDATES, no Sparkle Info.plist keys, and no Sparkle
        # load command — nothing references the framework, so the linker drops it entirely.
        Release:
          OTHER_LDFLAGS: "$(inherited) -Wl,-dead_strip_dylibs"
# Shared scheme so `xcodebuild -scheme tscribe -configuration <Debug|Release|ReleaseStandard>`
# works deterministically on a fresh checkout (e.g. CI), not just after opening in Xcode.
schemes:
  tscribe:
    build:
      targets:
        tscribe: all
    run:
      config: Debug
    archive:
      config: Release
